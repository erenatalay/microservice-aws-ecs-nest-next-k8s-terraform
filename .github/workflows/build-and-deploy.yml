name: Build and Deploy (AWS ECS)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: "build-and-deploy"
        type: choice
        options:
          - build-only
          - deploy-only
          - build-and-deploy
      environment:
        description: "Terraform environment file"
        required: true
        default: "production"
        type: choice
        options:
          - dev
          - staging
          - production
      image_tag:
        description: "Image tag for deploy-only (default: latest)"
        required: false
        default: "latest"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TF_VERSION: "1.5.0"
  TF_WORKING_DIR: "./terraform"

jobs:
  build:
    name: Build and Push Images (ECR)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry || steps.meta.outputs.ecr_registry_fallback }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.action }}" == "deploy-only" ]]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
          echo "ecr_registry_fallback=not-used" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push auth-api
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./auth-api
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/auth-api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/auth-api:latest

      - name: Build and Push product-api
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./product-api
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/product-api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/product-api:latest

      - name: Build and Push gateway
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/gateway:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/gateway:latest

      - name: Build and Push ecommerce
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/ecommerce:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/ecommerce:latest

  deploy:
    name: Terraform Apply (AWS ECS)
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      github.event_name == 'push' ||
      github.event.inputs.action == 'deploy-only' ||
      github.event.inputs.action == 'build-and-deploy'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve deploy variables
        id: deploy_meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
          else
            DEPLOY_ENV="production"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.action }}" == "deploy-only" ]]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ -n "${{ needs.build.outputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          else
            IMAGE_TAG="${GITHUB_SHA}"
          fi

          echo "deploy_env=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var-file="environments/${{ steps.deploy_meta.outputs.deploy_env }}.tfvars" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="auth_api_image=${{ steps.deploy_meta.outputs.registry }}/auth-api:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="product_api_image=${{ steps.deploy_meta.outputs.registry }}/product-api:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="gateway_image=${{ steps.deploy_meta.outputs.registry }}/gateway:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="ecommerce_image=${{ steps.deploy_meta.outputs.registry }}/ecommerce:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="auth_database_url=${{ secrets.AUTH_DATABASE_URL }}" \
            -var="product_database_url=${{ secrets.PRODUCT_DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="environments/${{ steps.deploy_meta.outputs.deploy_env }}.tfvars" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="auth_api_image=${{ steps.deploy_meta.outputs.registry }}/auth-api:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="product_api_image=${{ steps.deploy_meta.outputs.registry }}/product-api:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="gateway_image=${{ steps.deploy_meta.outputs.registry }}/gateway:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="ecommerce_image=${{ steps.deploy_meta.outputs.registry }}/ecommerce:${{ steps.deploy_meta.outputs.image_tag }}" \
            -var="auth_database_url=${{ secrets.AUTH_DATABASE_URL }}" \
            -var="product_database_url=${{ secrets.PRODUCT_DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Deployment Summary
        run: |
          echo "## AWS ECS Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ steps.deploy_meta.outputs.deploy_env }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: ${{ steps.deploy_meta.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry: ${{ steps.deploy_meta.outputs.registry }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          terraform output >> "$GITHUB_STEP_SUMMARY"

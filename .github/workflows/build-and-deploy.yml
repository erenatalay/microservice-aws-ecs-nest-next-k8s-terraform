name: Build and Deploy (AWS ECS + Docker Hub)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: "build-and-deploy"
        type: choice
        options:
          - build-only
          - deploy-only
          - build-and-deploy
      image_tag:
        description: "Image tag for deploy-only"
        required: false
        default: "latest"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TF_VERSION: "1.5.0"
  TF_WORKING_DIR: "./terraform"
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: Build and Push Images (Docker Hub)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_base: ${{ steps.meta.outputs.registry_base }}

    steps:
      - name: Checkout
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.action }}" == "deploy-only" ]]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${GITHUB_SHA}"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry_base=docker.io/${DOCKERHUB_NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub configuration
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        shell: bash
        run: |
          test -n "${DOCKERHUB_NAMESPACE}" || (echo "DOCKERHUB_NAMESPACE is required" && exit 1)
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "DOCKERHUB_USERNAME secret is required" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "DOCKERHUB_TOKEN secret is required" && exit 1)

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push auth-api
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./auth-api
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/auth-api:${{ steps.meta.outputs.image_tag }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/auth-api:latest

      - name: Build and Push product-api
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./product-api
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/product-api:${{ steps.meta.outputs.image_tag }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/product-api:latest

      - name: Build and Push gateway
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/gateway:${{ steps.meta.outputs.image_tag }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/gateway:latest

      - name: Build and Push ecommerce
        if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/ecommerce:${{ steps.meta.outputs.image_tag }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/ecommerce:latest

  deploy:
    name: Terraform Apply (AWS ECS)
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      github.event_name == 'push' ||
      github.event.inputs.action == 'deploy-only' ||
      github.event.inputs.action == 'build-and-deploy'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Terraform backend metadata
        id: backend_meta
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_NAME="$(awk -F'=' '/^project_name[[:space:]]*=/{gsub(/[ "]/, "", $2); print $2}' environments/production.tfvars)"
          ENVIRONMENT_NAME="$(awk -F'=' '/^environment[[:space:]]*=/{gsub(/[ "]/, "", $2); print $2}' environments/production.tfvars)"
          ACCOUNT_ID="$(aws sts get-caller-identity --query 'Account' --output text)"

          test -n "${PROJECT_NAME}" || (echo "project_name could not be resolved from production.tfvars" && exit 1)
          test -n "${ENVIRONMENT_NAME}" || (echo "environment could not be resolved from production.tfvars" && exit 1)

          BACKEND_BUCKET="$(echo "${PROJECT_NAME}-${ENVIRONMENT_NAME}-${ACCOUNT_ID}-${AWS_REGION}-tfstate" | tr '[:upper:]_' '[:lower:]-' | cut -c1-63 | sed 's/-$//')"
          LOCK_TABLE="$(echo "${PROJECT_NAME}-${ENVIRONMENT_NAME}-terraform-locks" | tr '[:upper:]_' '[:lower:]-' | cut -c1-255)"
          STATE_KEY="${ENVIRONMENT_NAME}/terraform.tfstate"
          NAME_PREFIX="${PROJECT_NAME}-${ENVIRONMENT_NAME}"

          echo "project_name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "backend_bucket=${BACKEND_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "lock_table=${LOCK_TABLE}" >> "$GITHUB_OUTPUT"
          echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "name_prefix=${NAME_PREFIX}" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          set -euo pipefail

          BACKEND_BUCKET="${{ steps.backend_meta.outputs.backend_bucket }}"
          LOCK_TABLE="${{ steps.backend_meta.outputs.lock_table }}"

          if ! aws s3api head-bucket --bucket "${BACKEND_BUCKET}" 2>/dev/null; then
            if [[ "${AWS_REGION}" == "us-east-1" ]]; then
              aws s3api create-bucket --bucket "${BACKEND_BUCKET}"
            else
              aws s3api create-bucket \
                --bucket "${BACKEND_BUCKET}" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${BACKEND_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${BACKEND_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws dynamodb describe-table --table-name "${LOCK_TABLE}" >/dev/null 2>&1 || \
            aws dynamodb create-table \
              --table-name "${LOCK_TABLE}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST

      - name: Resolve deploy variables
        id: deploy_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "registry_base=${{ needs.build.outputs.registry_base }}" >> "$GITHUB_OUTPUT"

      - name: Export Terraform variables
        shell: bash
        run: |
          {
            echo "TF_VAR_aws_region=${{ env.AWS_REGION }}"
            echo "TF_VAR_auth_api_image=${{ steps.deploy_meta.outputs.registry_base }}/auth-api:${{ steps.deploy_meta.outputs.image_tag }}"
            echo "TF_VAR_product_api_image=${{ steps.deploy_meta.outputs.registry_base }}/product-api:${{ steps.deploy_meta.outputs.image_tag }}"
            echo "TF_VAR_gateway_image=${{ steps.deploy_meta.outputs.registry_base }}/gateway:${{ steps.deploy_meta.outputs.image_tag }}"
            echo "TF_VAR_ecommerce_image=${{ steps.deploy_meta.outputs.registry_base }}/ecommerce:${{ steps.deploy_meta.outputs.image_tag }}"
            echo "TF_VAR_dockerhub_repository_credentials_secret_arn=${{ secrets.DOCKERHUB_REPOSITORY_CREDENTIALS_SECRET_ARN }}"
            echo "TF_VAR_auth_database_url=${{ secrets.AUTH_DATABASE_URL }}"
            echo "TF_VAR_product_database_url=${{ secrets.PRODUCT_DATABASE_URL }}"
            echo "TF_VAR_jwt_refresh_secret=${{ secrets.JWT_REFRESH_SECRET }}"
            echo "TF_VAR_jwt_secret=${{ secrets.JWT_SECRET }}"
            echo "TF_VAR_grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate deploy secrets
        shell: bash
        run: |
          test -n "${{ secrets.AUTH_DATABASE_URL }}" || (echo "AUTH_DATABASE_URL secret is required" && exit 1)
          test -n "${{ secrets.PRODUCT_DATABASE_URL }}" || (echo "PRODUCT_DATABASE_URL secret is required" && exit 1)
          test -n "${{ secrets.JWT_SECRET }}" || (echo "JWT_SECRET secret is required" && exit 1)
          test -n "${{ secrets.GRAFANA_ADMIN_PASSWORD }}" || (echo "GRAFANA_ADMIN_PASSWORD secret is required" && exit 1)

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ steps.backend_meta.outputs.backend_bucket }}" \
            -backend-config="key=${{ steps.backend_meta.outputs.state_key }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ steps.backend_meta.outputs.lock_table }}" \
            -backend-config="encrypt=true"

      - name: Import partially created resources
        shell: bash
        run: |
          set -euo pipefail

          NAME_PREFIX="${{ steps.backend_meta.outputs.name_prefix }}"
          ACCOUNT_ID="${{ steps.backend_meta.outputs.account_id }}"

          alb_bucket_name() {
            echo "${NAME_PREFIX}-${ACCOUNT_ID}-${AWS_REGION}-alb-logs" | tr '[:upper:]_' '[:lower:]-' | cut -c1-63 | sed 's/-$//'
          }

          loki_bucket_name() {
            echo "${NAME_PREFIX}-${ACCOUNT_ID}-${AWS_REGION}-loki" | tr '[:upper:]_' '[:lower:]-' | cut -c1-63 | sed 's/-$//'
          }

          target_group_name() {
            printf '%s' "$1" | tr '_' '-' | cut -c1-32
          }

          import_if_missing() {
            local address="$1"
            local identifier="$2"

            if terraform state show "${address}" >/dev/null 2>&1; then
              return
            fi

            terraform import -input=false "${address}" "${identifier}"
          }

          if aws s3api head-bucket --bucket "$(alb_bucket_name)" 2>/dev/null; then
            import_if_missing 'aws_s3_bucket.alb_access_logs[0]' "$(alb_bucket_name)"
          fi

          if aws s3api head-bucket --bucket "$(loki_bucket_name)" 2>/dev/null; then
            import_if_missing 'aws_s3_bucket.loki' "$(loki_bucket_name)"
          fi

          if aws logs describe-log-groups --log-group-name-prefix "/ecs/${NAME_PREFIX}" --query 'logGroups[?logGroupName==`/ecs/'"${NAME_PREFIX}"'`].logGroupName' --output text | grep -q "/ecs/${NAME_PREFIX}"; then
            import_if_missing 'aws_cloudwatch_log_group.ecs' "/ecs/${NAME_PREFIX}"
          fi

          GATEWAY_TG_ARN="$(aws elbv2 describe-target-groups --names "$(target_group_name "${NAME_PREFIX}-gtw")" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)"
          if [[ -n "${GATEWAY_TG_ARN}" && "${GATEWAY_TG_ARN}" != "None" ]]; then
            import_if_missing 'aws_lb_target_group.gateway' "${GATEWAY_TG_ARN}"
          fi

          ECOMMERCE_TG_ARN="$(aws elbv2 describe-target-groups --names "$(target_group_name "${NAME_PREFIX}-ecom")" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)"
          if [[ -n "${ECOMMERCE_TG_ARN}" && "${ECOMMERCE_TG_ARN}" != "None" ]]; then
            import_if_missing 'aws_lb_target_group.ecommerce' "${ECOMMERCE_TG_ARN}"
          fi

          GRAFANA_TG_ARN="$(aws elbv2 describe-target-groups --names "$(target_group_name "${NAME_PREFIX}-grafana")" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)"
          if [[ -n "${GRAFANA_TG_ARN}" && "${GRAFANA_TG_ARN}" != "None" ]]; then
            import_if_missing 'aws_lb_target_group.grafana' "${GRAFANA_TG_ARN}"
          fi

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var-file="environments/production.tfvars"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="environments/production.tfvars"

      - name: Deployment Summary
        run: |
          echo "## AWS ECS Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: production" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: ${{ steps.deploy_meta.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry base: ${{ steps.deploy_meta.outputs.registry_base }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          terraform output >> "$GITHUB_STEP_SUMMARY"
